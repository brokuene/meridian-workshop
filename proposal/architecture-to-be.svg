  <rect x="246" y="266" width="108" height="28" fill="#dcfce7" stroke="#86efac" stroke-width="1.5" rx="4"/>
  <text x="300" y="284" text-anchor="middle" font-size="10" font-weight="600" fill="#15803d">✓ Reports.vue</text>

  <!-- Restocking NEW -->
  <rect x="366" y="266" width="108" height="28" fill="#dcfce7" stroke="#16a34a" stroke-width="2" rx="4"/>
  <text x="420" y="280" text-anchor="middle" font-size="10" font-weight="700" fill="#15803d">✦ Restocking.vue</text>
  <text x="420" y="292" text-anchor="middle" font-size="8" fill="#16a34a">NEW</text>

