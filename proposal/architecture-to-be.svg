  <rect x="236" y="360" width="268" height="36" fill="#bfdbfe" stroke="#60a5fa" stroke-width="1" rx="6"/>
  <text x="370" y="382" text-anchor="middle" font-size="10" font-weight="600" fill="#1e40af">api.js — HTTP client</text>

