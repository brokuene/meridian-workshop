  <rect x="236" y="412" width="120" height="54" fill="#dcfce7" stroke="#86efac" stroke-width="1.5" rx="6"/>
  <text x="296" y="430" text-anchor="middle" font-size="10" font-weight="600" fill="#15803d">✓ useI18n()</text>
  <text x="296" y="446" text-anchor="middle" font-size="9" fill="#166534">en.js ✓  ja.js ✓</text>
  <text x="296" y="460" text-anchor="middle" font-size="9" fill="#166534">full coverage</text>

  <!-- Dark mode badge -->
  <rect x="370" y="412" width="134" height="54" fill="#f3e8ff" stroke="#c084fc" stroke-width="1.5" rx="6"/>
  <text x="437" y="430" text-anchor="middle" font-size="10" font-weight="600" fill="#7c3aed">✦ Dark Mode</text>
  <text x="437" y="446" text-anchor="middle" font-size="9" fill="#6d28d9">CSS variable swap</text>
  <text x="437" y="460" text-anchor="middle" font-size="9" fill="#6d28d9">localStorage toggle</text>

