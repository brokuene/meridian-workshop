  <text x="710" y="142" text-anchor="middle" font-size="10" font-weight="600" fill="#166534">16 + 1 REST Endpoints</text>
  <text x="710" y="160" text-anchor="middle" font-size="9" fill="#166534">GET /api/inventory · /api/orders</text>
  <text x="710" y="176" text-anchor="middle" font-size="9" fill="#166534">GET /api/dashboard/summary</text>
  <text x="710" y="192" text-anchor="middle" font-size="9" fill="#166534">GET /api/demand · /api/backlog</text>
  <text x="710" y="208" text-anchor="middle" font-size="9" fill="#166534">GET /api/reports/quarterly</text>
  <text x="710" y="224" text-anchor="middle" font-size="9" fill="#166534">GET /api/reports/monthly-trends</text>
  <text x="710" y="240" text-anchor="middle" font-size="9" fill="#166534">GET /api/spending/*</text>
  <text x="710" y="260" text-anchor="middle" font-size="10" font-weight="700" fill="#15803d">✦ GET /api/restocking?budget=N</text>
  <text x="710" y="278" text-anchor="middle" font-size="9" fill="#166534">mock_data.py</text>
  <text x="710" y="296" text-anchor="middle" font-size="9" fill="#166534">rule-based recommendation logic</text>
  <text x="710" y="312" text-anchor="middle" font-size="9" fill="#166534">NEW</text>

  <!-- Data files -->
  <rect x="596" y="336" width="228" height="54" fill="#bbf7d0" stroke="#86efac" stroke-width="1" rx="6"/>
  <text x="710" y="356" text-anchor="middle" font-size="10" font-weight="600" fill="#166534">server/data/*.json</text>
  <text x="710" y="372" text-anchor="middle" font-size="9" fill="#166534">inventory · orders · demand</text>
  <text x="710" y="388" text-anchor="middle" font-size="9" fill="#166534">backlog · spending · suppliers</text>

  <!-- Arrow api.js → backend -->
  <line x1="506" y1="378" x2="578" y2="300" stroke="#60a5fa" stroke-width="1.5" marker-end="url(#arrowblue2)"/>
  <text x="540" y="333" text-anchor="middle" font-size="9" fill="#3b82f6">HTTP/REST</text>

  <!-- ── PLAYWRIGHT TESTS ── -->
  <rect x="580" y="416" width="260" height="94" fill="#fdf4ff" stroke="#c084fc" stroke-width="1.5" rx="8"/>
  <text x="710" y="436" text-anchor="middle" font-size="10" font-weight="600" fill="#7c3aed">✦ Playwright E2E Tests (R3)</text>
  <text x="710" y="454" text-anchor="middle" font-size="9" fill="#6d28d9">✓ Dashboard KPIs load</text>
  <text x="710" y="470" text-anchor="middle" font-size="9" fill="#6d28d9">✓ Inventory filter · Reports render</text>
  <text x="710" y="486" text-anchor="middle" font-size="9" fill="#6d28d9">✓ Restocking flow · i18n toggle</text>
  <text x="710" y="502" text-anchor="middle" font-size="9" fill="#6d28d9">IT-approved change gate ✓</text>

  <!-- ── ARCHITECTURE DOCS ── -->
  <rect x="220" y="526" width="620" height="52" fill="#fefce8" stroke="#fde047" stroke-width="1.5" rx="8"/>
  <text x="530" y="548" text-anchor="middle" font-size="11" font-weight="600" fill="#a16207">✦ Architecture Documentation (R4)</text>
  <text x="530" y="566" text-anchor="middle" font-size="10" fill="#92400e">proposal/architecture.html · handoff-ready for Meridian IT · view map · endpoint inventory · data flow · i18n system</text>

  <!-- Arrow defs -->
  <defs>
    <marker id="arrow2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#94a3b8"/>
    </marker>
    <marker id="arrowblue2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#60a5fa"/>
    </marker>
  </defs>
