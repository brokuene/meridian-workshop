  <text x="300" y="170" text-anchor="middle" font-size="10" fill="#1e293b">Dashboard.vue</text>

  <rect x="366" y="152" width="108" height="28" fill="#ffffff" stroke="#93c5fd" stroke-width="1" rx="4"/>
  <text x="420" y="170" text-anchor="middle" font-size="10" fill="#1e293b">Inventory.vue</text>

  <rect x="246" y="190" width="108" height="28" fill="#ffffff" stroke="#93c5fd" stroke-width="1" rx="4"/>
  <text x="300" y="208" text-anchor="middle" font-size="10" fill="#1e293b">Orders.vue</text>

  <rect x="366" y="190" width="108" height="28" fill="#ffffff" stroke="#93c5fd" stroke-width="1" rx="4"/>
  <text x="420" y="208" text-anchor="middle" font-size="10" fill="#1e293b">Demand.vue</text>

  <rect x="246" y="228" width="108" height="28" fill="#ffffff" stroke="#93c5fd" stroke-width="1" rx="4"/>
  <text x="300" y="246" text-anchor="middle" font-size="10" fill="#1e293b">Spending.vue</text>

  <rect x="366" y="228" width="108" height="28" fill="#ffffff" stroke="#93c5fd" stroke-width="1" rx="4"/>
  <text x="420" y="246" text-anchor="middle" font-size="10" fill="#1e293b">Backlog.vue</text>

