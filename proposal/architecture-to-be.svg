  <line x1="160" y1="290" x2="218" y2="290" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow2)"/>
  <text x="189" y="284" text-anchor="middle" font-size="9" fill="#64748b">HTTP</text>

